trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release

steps:
# 1) Installer .NET 8
- task: UseDotNet@2
  displayName: 'Install .NET 8 SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# 2) Créer le manifest d’outils locaux (exigence du prof)
- script: |
    dotnet new tool-manifest
  displayName: "Création du tool-manifest (.config/dotnet-tools.json)"


# 3) Installer dotnet-ef EXACTEMENT à la version demandée
- script: |
    dotnet tool install dotnet-ef --version 6.0.12
  displayName: "Installation EF (dotnet-ef) - outil local (6.0.12)"


# 4) Restore
- script: |
    dotnet restore GestionClients.sln
  displayName: 'Restore solution'

# 5) Build
- script: |
    dotnet build GestionClients.sln -c $(buildConfiguration) --no-restore
  displayName: 'Build solution'

# 6) Tests
- script: |
    dotnet test GestionClients.sln -c $(buildConfiguration) --no-build
  displayName: 'Test solution'

# =========================
# ARTEFACT 1 : GC.ConsoleUI
# =========================
- script: |
    dotnet publish GC.ConsoleUI/GC.ConsoleUI.csproj \
      -c $(buildConfiguration) \
      -o $(Build.ArtifactStagingDirectory)/GC.ConsoleUI
  displayName: 'Publish GC.ConsoleUI'

- publish: $(Build.ArtifactStagingDirectory)/GC.ConsoleUI
  artifact: GC.ConsoleUI

# ==========================================================
# ARTEFACT 2 : GC.Batch.ModifierNomPrenomPremiereLettreMajuscules
# ==========================================================
- script: |
    dotnet publish GC.Batch.ModifierNomPrenomPremiereLettreMajuscules/GC.Batch.ModifierNomPrenomPremiereLettreMajuscules.csproj \
      -c $(buildConfiguration) \
      -o $(Build.ArtifactStagingDirectory)/GC.Batch.ModifierNomPrenomPremiereLettreMajuscules
  displayName: 'Publish GC.Batch.ModifierNomPrenomPremiereLettreMajuscules'

- publish: $(Build.ArtifactStagingDirectory)/GC.Batch.ModifierNomPrenomPremiereLettreMajuscules
  artifact: GC.Batch.ModifierNomPrenomPremiereLettreMajuscules

# =================================================
# ARTEFACT 3 : GC.Batch.ModifierPaysMajusculesClients
# =================================================
- script: |
    dotnet publish GC.Batch.ModifierPaysMajusculesClients/GC.Batch.ModifierPaysMajusculesClients.csproj \
      -c $(buildConfiguration) \
      -o $(Build.ArtifactStagingDirectory)/GC.Batch.ModifierPaysMajusculesClients
  displayName: 'Publish GC.Batch.ModifierPaysMajusculesClients'

- publish: $(Build.ArtifactStagingDirectory)/GC.Batch.ModifierPaysMajusculesClients
  artifact: GC.Batch.ModifierPaysMajusculesClients


# ARTEFACT 4 : GC.WebReact
# (inclut le script SQL)

- script: |
    dotnet publish GC.WebReact/GC.WebReact.csproj \
      -c $(buildConfiguration) \
      -o $(Build.ArtifactStagingDirectory)/GC.WebReact
  displayName: 'Publish GC.WebReact'

# Génération du script SQL idempotent DANS l’artefact GC.WebReact
- script: |
    mkdir -p $(Build.ArtifactStagingDirectory)/GC.WebReact/SQL
    dotnet tool run dotnet-ef migrations script --idempotent \
      --project GC.DAL.EF/GC.DAL.EF.csproj \
      --startup-project GC.WebReact/GC.WebReact.csproj \
      --output $(Build.ArtifactStagingDirectory)/GC.WebReact/SQL/gc-migrations.sql
  displayName: 'Generate SQL migration script (idempotent)'

- publish: $(Build.ArtifactStagingDirectory)/GC.WebReact
  artifact: GC.WebReact
